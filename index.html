
        <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hacker Screen</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
overflow:hidden;
}

.box{
width:90%;
max-width:380px;
background:#c40000;
color:#fff;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 0 25px red;
animation:shake .15s infinite;
}

h1{
font-size:28px;
margin-bottom:15px;
}

.progress{
width:100%;
height:22px;
background:#fff;
border-radius:20px;
overflow:hidden;
margin:20px 0;
}

.bar{
height:100%;
width:0%;
background:lime;
animation:load 20s linear forwards;
}

button{
padding:12px 35px;
font-size:18px;
border:none;
border-radius:8px;
background:#111;
color:white;
cursor:pointer;
margin-top:10px;
}

small{
display:block;
margin-top:15px;
font-size:14px;
}

@keyframes load{
from{width:0%;}
to{width:100%;}
}

@keyframes shake{
0%{transform:translateX(-2px);}
50%{transform:translateX(2px);}
100%{transform:translateX(-2px);}
}
</style>
</head>

<body>

<div class="box" id="box">

<h1>⚠ YOUR PHONE HAS BEEN HACKED ⚠</h1>

<p>Scanning Device...</p>

<div class="progress">
<div class="bar"></div>
</div>

<p id="text">0%</p>

<button onclick="finish()">OK</button>

<small>haked by professor dip.</small>

</div>

<script>
let p=0;

let t=setInterval(()=>{
p++;
document.getElementById("text").innerHTML=p+"%";

try{
navigator.vibrate(80);
}catch(e){}

if(p>=100){
clearInterval(t);
finish();
}
},200);

function beep(){
let ctx=new(window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
osc.connect(ctx.destination);
osc.frequency.value=700;
osc.start();
setTimeout(()=>{
osc.stop();
ctx.close();
},120);
}

setInterval(beep,1000);

function finish(){
document.body.innerHTML="<h1 style='color:white;font-family:Arial;text-align:center'>😂 bow ta doraigese reee😘 😂</h1>";
}
</script>

</body>
</html>
