<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warning</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.popup{
width:340px;
background:#d60000;
border-radius:10px;
padding:20px;
text-align:center;
color:#fff;

h1{

}

p{
font-size:18px;
margin:10px 0;
}

.progress{
width:100%;
height:20px;
background:#fff;
border-radius:10px;
overflow:hidden;
margin:15px 0;
}

.bar{
width:0%;
height:100%;
background:lime;
animation:load 4s linear forwards;
}

@keyframes load{
0%{width:0%;}
100%{width:100%;}
}

button{
margin-top:20px;
padding:12px 30px;
font-size:18px;
border:none;
border-radius:8px;
background:#222;
color:#fff;
cursor:pointer;
}

button:hover{
background:#000;
}

#fake{
font-size:14px;
margin-top:10px;
color:#ffe;
}
</style>

</head>

<div class="popup" id="popup">

<p>Scanning Device...</p>

<div class="progress">
<div class="bar"></div>
</div>

<p id="real">( hacked by professor)</p>

<button onclick="closePrank()">OK</button>

</div>

<script>
function closePrank(){
document.getElementById("popup").style.display="none";
document.body.innerHTML="<h2 style='color:white;font-family:Arial;text-align:center;'>😂 Prank Over!</h2>";
}
</script>

</body>
